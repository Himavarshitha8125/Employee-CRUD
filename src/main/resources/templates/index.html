<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="text-center mb-4 animate__animated animate__fadeInDown">Employee Management</h1>
    <div class="text-end mb-3">
        <a href="/employees/add" class="btn btn-success animate__animated animate__pulse animate__infinite">Add Employee</a>
    </div>
    <table class="table table-striped table-hover animate__animated animate__fadeIn">
        <head class="table-dark">
            <tr>
                <th>ID</th><th>Name</th><th>Email</th><th>Department</th><th>Actions</th>
            </tr>
        </head>
        <tbody>
        <tr th:each="employee : ${employees}">
            <td th:text="${employee.id}"></td>
            <td th:text="${employee.name}"></td>
            <td th:text="${employee.email}"></td>
            <td th:text="${employee.department}"></td>
            <td>
                <a th:href="@{'/employees/edit/' + ${employee.id}}" class="btn btn-primary btn-sm">Edit</a>
                <a th:href="@{'/employees/delete/' + ${employee.id}}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/scripts.js"></script>
</body>
</html>
